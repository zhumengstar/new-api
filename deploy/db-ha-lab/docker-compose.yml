name: new-api-db-ha-lab

services:
  pg-0:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: lab-postgres-password
      POSTGRES_DB: newapi
      APP_DB_USER: newapi
      APP_DB_PASSWORD: newapi-password
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator-password
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - hot_standby=on
      - -c
      - listen_addresses=*
    volumes:
      - pg_0_data:/var/lib/postgresql/data
      - ./postgres/init-primary.sh:/docker-entrypoint-initdb.d/01-init-primary.sh:ro
    networks:
      - db-ha-lab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d newapi"]
      interval: 5s
      timeout: 5s
      retries: 12

  pg-1:
    image: postgres:15-alpine
    restart: unless-stopped
    depends_on:
      pg-0:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: lab-postgres-password
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator-password
      PRIMARY_HOST: pg-0
      PGDATA: /var/lib/postgresql/data
    entrypoint: ["/usr/local/bin/replica-entrypoint.sh"]
    command:
      - postgres
      - -c
      - hot_standby=on
      - -c
      - listen_addresses=*
    volumes:
      - pg_1_data:/var/lib/postgresql/data
      - ./postgres/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    networks:
      - db-ha-lab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d newapi"]
      interval: 5s
      timeout: 5s
      retries: 12

  pg-2:
    image: postgres:15-alpine
    restart: unless-stopped
    depends_on:
      pg-0:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: lab-postgres-password
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator-password
      PRIMARY_HOST: pg-0
      PGDATA: /var/lib/postgresql/data
    entrypoint: ["/usr/local/bin/replica-entrypoint.sh"]
    command:
      - postgres
      - -c
      - hot_standby=on
      - -c
      - listen_addresses=*
    volumes:
      - pg_2_data:/var/lib/postgresql/data
      - ./postgres/replica-entrypoint.sh:/usr/local/bin/replica-entrypoint.sh:ro
    networks:
      - db-ha-lab
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d newapi"]
      interval: 5s
      timeout: 5s
      retries: 12

  failover-manager:
    image: postgres:15-alpine
    restart: unless-stopped
    depends_on:
      pg-0:
        condition: service_healthy
      pg-1:
        condition: service_healthy
      pg-2:
        condition: service_healthy
    environment:
      POSTGRES_PASSWORD: lab-postgres-password
      BACKEND_NODES: pg-0 pg-1 pg-2
      STATE_FILE: /ha-state/primary
    entrypoint: ["/usr/local/bin/failover-manager.sh"]
    volumes:
      - ha_state:/ha-state
      - ./postgres/failover-manager.sh:/usr/local/bin/failover-manager.sh:ro
    networks:
      - db-ha-lab

  db-router:
    build:
      context: ./router
    restart: unless-stopped
    depends_on:
      failover-manager:
        condition: service_started
    environment:
      ROUTER_LISTEN_ADDR: :5432
      ROUTER_STATE_FILE: /ha-state/primary
      ROUTER_DEFAULT_PORT: "5432"
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - ha_state:/ha-state:ro
    networks:
      - db-ha-lab
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pg_0_data:
  pg_1_data:
  pg_2_data:
  ha_state:

networks:
  db-ha-lab:
    driver: bridge
